<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Informativo Jurídico — BM Juris</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    font-family: 'Manrope', sans-serif;
    background: #08151b;
    position: relative;
  }

  /* ── Fundo com gradiente radial ── */
  .bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 120% 60% at 80% -10%, rgba(241,189,137,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 100% 80% at -10% 80%, rgba(19,32,38,0.9) 0%, transparent 70%),
      linear-gradient(160deg, #0d1f27 0%, #08151b 40%, #06111a 100%);
  }

  /* ── Marca d'água ── */
  .watermark {
    position: absolute;
    right: -60px;
    bottom: 80px;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }
  .watermark-text {
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: 520px;
    color: transparent;
    -webkit-text-stroke: 1.5px rgba(241,189,137,0.05);
    line-height: 1;
    user-select: none;
    letter-spacing: -20px;
  }

  /* ── Linha horizontal sutil no topo ── */
  .top-accent {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(to right, transparent, rgba(241,189,137,0.6), rgba(241,189,137,0.2), transparent);
    z-index: 20;
  }

  /* ── Card principal ── */
  .card {
    position: absolute;
    inset: 60px;
    background: linear-gradient(165deg, #132026 0%, #0d1c23 50%, #08151b 100%);
    border-radius: 44px;
    border: 1px solid rgba(241,189,137,0.12);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 10;
    box-shadow:
      inset 0 1px 0 rgba(241,189,137,0.08),
      0 80px 160px rgba(0,0,0,0.6),
      0 0 0 1px rgba(0,0,0,0.4);
  }

  /* ── Header ── */
  .header {
    padding: 72px 80px 0;
    display: flex;
    align-items: center;
    gap: 0;
  }

  .logo-mark {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  /* Logo BM estilizada usando máscara quadrados sobrepostos */
  .logo-icon {
    width: 64px;
    height: 64px;
    position: relative;
  }
  .logo-icon::before {
    content: '';
    position: absolute;
    inset: 0;
    border: 3px solid #f1bd89;
    border-radius: 6px;
  }
  .logo-icon::after {
    content: '';
    position: absolute;
    top: 10px;
    left: 10px;
    right: -10px;
    bottom: -10px;
    border: 1.5px solid rgba(241,189,137,0.3);
    border-radius: 6px;
  }
  .logo-letters {
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: 28px;
    color: #f1bd89;
    letter-spacing: -1px;
    line-height: 1;
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-divider {
    width: 1px;
    height: 48px;
    background: rgba(241,189,137,0.15);
    margin: 0 24px;
  }

  .logo-name {
    font-family: 'Manrope', sans-serif;
    font-weight: 600;
    font-size: 26px;
    color: rgba(241,189,137,0.7);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* ── Badge área ── */
  .badge-row {
    padding: 64px 80px 0;
    display: flex;
    align-items: stretch;
    gap: 0;
    align-self: flex-start;
  }

  .badge-filled {
    background: #f1bd89;
    color: #08151b;
    font-family: 'Manrope', sans-serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 4px;
    text-transform: uppercase;
    padding: 14px 28px;
    border-radius: 8px 0 0 8px;
    display: flex;
    align-items: center;
  }

  .badge-outline {
    color: #f1bd89;
    font-family: 'Manrope', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    padding: 12px 28px;
    border: 1.5px solid rgba(241,189,137,0.45);
    border-left: none;
    border-radius: 0 8px 8px 0;
    display: flex;
    align-items: center;
    background: rgba(241,189,137,0.05);
  }

  /* ── Conteúdo ── */
  .content {
    flex: 1;
    padding: 72px 80px 56px;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
  }

  /* Linha decorativa antes do título */
  .pre-line {
    width: 48px;
    height: 3px;
    background: linear-gradient(to right, #f1bd89, rgba(241,189,137,0.2));
    border-radius: 2px;
    margin-bottom: 40px;
  }

  .titulo {
    font-family: 'Manrope', sans-serif;
    font-size: 100px;
    font-weight: 800;
    line-height: 1.08;
    color: #d7e5ed;
    letter-spacing: -3px;
    margin-bottom: 60px;
    word-break: break-word;
    hyphens: auto;
  }

  .subtitulo {
    font-family: 'Inter', sans-serif;
    font-size: 38px;
    font-weight: 400;
    line-height: 1.6;
    color: rgba(187,201,209,0.65);
    max-width: 92%;
  }

  /* ── Divider antes do rodapé ── */
  .card-divider {
    margin: 0 80px;
    height: 1px;
    background: linear-gradient(to right, rgba(241,189,137,0.15), transparent);
  }

  /* ── Rodapé ── */
  .footer {
    padding: 44px 80px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    background: rgba(6,10,13,0.5);
  }

  .footer-left {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
  }

  .footer-cta {
    font-family: 'Manrope', sans-serif;
    font-size: 34px;
    font-weight: 600;
    color: #f1bd89;
    letter-spacing: 0;
    line-height: 1.3;
  }

  .footer-sub {
    font-family: 'Inter', sans-serif;
    font-size: 22px;
    font-weight: 400;
    color: rgba(187,201,209,0.35);
    letter-spacing: 1px;
  }

  .footer-btn {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: rgba(241,189,137,0.08);
    border: 1.5px solid rgba(241,189,137,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #f1bd89;
    font-size: 28px;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="bg"></div>
<div class="top-accent"></div>

<!-- Marca d'água -->
<div class="watermark">
  <span class="watermark-text" data-editable="watermark" data-label="Marca D'água" data-type="text">BM</span>
</div>

<!-- Card principal -->
<div class="card">

  <!-- Header -->
  <div class="header">
    <div class="logo-mark">
      <div class="logo-icon">
        <span class="logo-letters" data-editable="logo" data-label="Sigla do Logo" data-type="text">BM</span>
      </div>
      <div class="logo-divider"></div>
      <span class="logo-name" data-editable="escritorio" data-label="Nome do Escritório" data-type="text">BM Juris</span>
    </div>
  </div>

  <!-- Badge -->
  <div class="badge-row">
    <span class="badge-filled" data-editable="badge-label" data-label="Badge — Parte Clara" data-type="text">INFORMATIVO</span>
    <span class="badge-outline" data-editable="badge-tipo" data-label="Badge — Parte Escura" data-type="text">JURÍDICO</span>
  </div>

  <!-- Conteúdo -->
  <div class="content">
    <div class="pre-line"></div>
    <h1 class="titulo" data-editable="titulo" data-label="Título Principal" data-type="textarea">Presos no semiaberto podem cumprir pena fora do presídio?</h1>
    <p class="subtitulo" data-editable="subtitulo" data-label="Subtítulo / Descrição" data-type="textarea">Entenda quando a Justiça permite o chamado 'semiaberto harmonizado' e quem pode ser beneficiado.</p>
  </div>

  <!-- Divider -->
  <div class="card-divider"></div>

  <!-- Rodapé -->
  <div class="footer">
    <div class="footer-left">
      <span class="footer-cta" data-editable="cta" data-label="Texto do CTA" data-type="text">Veja a matéria completa no site</span>
      <span class="footer-sub" data-editable="site" data-label="Site / @" data-type="text">bmjuris.com.br</span>
    </div>
    <div class="footer-btn">↗</div>
  </div>

</div>

</body>
</html>
